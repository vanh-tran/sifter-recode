name: Integration Tests

on:
  workflow_call:

jobs:
  integration:
    name: Integration tests (Supabase local)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Reset database (apply migrations)
        run: supabase db reset --db-url postgresql://postgres:postgres@localhost:54322/postgres

      - name: Export Supabase connection details
        run: |
          STATUS=$(supabase status)
          echo "SUPABASE_URL=$(echo "$STATUS"          | grep 'API URL'          | awk '{print $NF}')" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=$(echo "$STATUS"     | grep 'anon key'         | awk '{print $NF}')" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$STATUS" | grep 'service_role key' | awk '{print $NF}')" >> $GITHUB_ENV

      - name: Run integration tests
        run: pnpm test:integration

      - name: Stop Supabase
        if: always()
        run: supabase stop
