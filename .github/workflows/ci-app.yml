name: CI — App

on:
  pull_request:
    paths:
      - 'app/**'
      - 'lib/**'
      - 'packages/**'
      - '__tests__/**'
      - '!__tests__/worker/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'eslint.config.mjs'
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'lib/**'
      - 'packages/**'
      - '__tests__/**'
      - '!__tests__/worker/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'vitest.config.ts'
      - 'eslint.config.mjs'

concurrency:
  group: ci-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test:unit

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
